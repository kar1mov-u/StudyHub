services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studyhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studyhub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: ./migrations
    restart: on-failure
    command: ["-path", "/migrations", "-database", "postgres://postgres:postgres@db:5432/studyhub?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy

  rag-service:
    build:
      context: ./rag-service
    restart: unless-stopped
    env_file: .env
    volumes:
      - rag_data:/app/data
      - rag_chroma:/app/chroma_db

  backend:
    build:
      context: ./backend
    restart: on-failure
    env_file: .env
    environment:
      DB_HOST: db
      RBMQ_HOST: rabbitmq
      RAG_SERVICE_URL: http://rag-service:8001
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      rag-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  rag_data:
  rag_chroma:
