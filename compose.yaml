# this is compose file for the prod
services:
  rag-service:
    image: ghcr.io/kar1mov-u/studyhub-rag-service:latest
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - studyhub_net
    volumes:
      - rag_data:/app/data
      - rag_chroma:/app/chroma_db

  backend:
    build: backend/
    # image: ghcr.io/kar1mov-u/study_hub_backend:latest

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_started
      rabbitmq:
        condition: service_started
      rag-service:
        condition: service_started
    networks:
      - studyhub_net
    env_file:
      - .env
    environment:
      RAG_SERVICE_URL: http://rag-service:8001
    ports:
      - "8080:8080"
  frontend:
    build: frontend/
    # image: ghcr.io/kar1mov-u/study_hub_front_end:latest

    ports:
      - "80:80" 
    networks:
      - studyhub_net
    depends_on:
      backend:
        condition: service_started

  db:
    image: postgres:latest
    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      
    ports:
      - "5432:5432"
    networks:
      - studyhub_net
    volumes:
      - study_hub_db_test:/var/lib/postgresql


  migrate:
    build: ./migrations 
    # image: ghcr.io/kar1mov-u/study_hub-migrate:latest
    networks:
      - studyhub_net
    depends_on:
      db:
        condition: service_healthy
    command:
       - -path=/migrations/
       - -database=postgres://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/${DB_NAME}?sslmode=disable
       - up



    
  gotenberg:
      image: gotenberg/gotenberg:8
      networks:
        - studyhub_net
      ports:
        - "3000:3000"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - studyhub_net
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/mnesia


volumes:
  study_hub_db_test:
  rabbitmq_data:
  rag_data:
  rag_chroma:


networks:
  studyhub_net:
    driver: bridge
